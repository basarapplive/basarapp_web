<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BasarApp Dashboard Panel</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6fb;
        --panel: #ffffff;
        --primary: #2f4bff;
        --text: #1f2937;
        --muted: #64748b;
        --ok: #059669;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 32%);
      }

      .dashboard {
        max-width: 1024px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .panel {
        background: var(--panel);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 35px rgba(15, 23, 42, 0.08);
      }

      .panel-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 24px;
      }

      .panel h1 {
        margin: 0;
        font-size: 1.4rem;
      }

      .badge {
        padding: 6px 10px;
        border-radius: 999px;
        background: #dcfce7;
        color: var(--ok);
        font-weight: 600;
        font-size: 0.82rem;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 14px;
        margin-bottom: 20px;
      }

      .card {
        background: #f8faff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 14px;
      }

      .card .label {
        margin: 0 0 8px;
        font-size: 0.84rem;
        color: var(--muted);
      }

      .card .value {
        margin: 0;
        font-size: 1.4rem;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }

      .list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
      }

      .list li + li {
        margin-top: 8px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-primary {
        color: #fff;
        background: var(--primary);
      }

      .btn-secondary {
        color: var(--text);
        background: #e2e8f0;
      }
    </style>
  </head>
  <body>
    <main class="dashboard">
      <section class="panel" aria-label="BasarApp dashboard panel">
        <div class="panel-head">
          <h1>BasarApp Dashboard Panel</h1>
          <span class="badge">System healthy</span>
        </div>

        <div class="stats">
          <article class="card">
            <p class="label">Active users</p>
            <p class="value">1,204</p>
          </article>
          <article class="card">
            <p class="label">New signups</p>
            <p class="value">87</p>
          </article>
          <article class="card">
            <p class="label">Open tickets</p>
            <p class="value">13</p>
          </article>
          <article class="card">
            <p class="label">Revenue today</p>
            <p class="value">$4,320</p>
          </article>
        </div>

        <div class="grid">
          <article class="card">
            <p class="label">Recent activity</p>
            <ul class="list">
              <li>Order #BA-1024 confirmed</li>
              <li>Vendor "CityCraft" updated products</li>
              <li>Support request assigned to Team A</li>
            </ul>
          </article>

          <article class="card">
            <p class="label">Quick actions</p>
            <div class="actions">
              <button class="btn btn-primary" type="button">Add listing</button>
              <button class="btn btn-secondary" type="button">View reports</button>
              <button class="btn btn-secondary" type="button">Open support</button>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
